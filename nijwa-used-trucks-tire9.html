<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue Leak Report — Nijwa Used Trucks</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #3B82F6;
    --blue-dark: #2563EB;
    --blue-deeper: #1E40AF;
    --blue-light: #EFF6FF;
    --blue-muted: #DBEAFE;
    --red: #EF4444;
    --red-light: #FEF2F2;
    --red-muted: #FECACA;
    --green: #10B981;
    --green-light: #ECFDF5;
    --amber: #F59E0B;
    --amber-light: #FFFBEB;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-400: #9CA3AF;
    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-800: #1F2937;
    --gray-900: #111827;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Lato', sans-serif; background: var(--gray-50); color: var(--gray-800); line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

  /* ── HEADER ── */
  .report-header { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 14px 0; position: sticky; top: 0; z-index: 200; }
  .header-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
  .header-brands { display: flex; align-items: center; gap: 14px; }
  .dealer-brand { display: flex; align-items: center; gap: 8px; }
  .dealer-logo-img { height: 32px; max-width: 140px; object-fit: contain; }
  .dealer-name-text { font-weight: 700; font-size: 13px; color: var(--gray-800); }
  .brand-sep { color: var(--gray-300); font-size: 16px; font-weight: 300; }
  .copilot-brand { display: flex; align-items: center; gap: 6px; }
  .copilot-brand .c-icon { width: 22px; height: 22px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 12px; }
  .copilot-brand .c-name { font-weight: 700; font-size: 14px; color: var(--blue); }

  /* Lang selector */
  .lang-selector { position: relative; }
  .lang-current { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--gray-200); border-radius: 8px; background: #fff; cursor: pointer; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; color: var(--gray-700); transition: all 0.15s; user-select: none; }
  .lang-current:hover { border-color: var(--blue); }
  .lang-current .arrow { font-size: 10px; color: var(--gray-400); transition: transform 0.2s; }
  .lang-selector.open .lang-current .arrow { transform: rotate(180deg); }
  .lang-dropdown { display: none; position: absolute; top: calc(100% + 4px); right: 0; background: #fff; border: 1px solid var(--gray-200); border-radius: 10px; box-shadow: var(--shadow-lg); overflow: hidden; z-index: 300; min-width: 160px; }
  .lang-selector.open .lang-dropdown { display: block; }
  .lang-option { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--gray-700); transition: background 0.1s; }
  .lang-option:hover { background: var(--blue-light); }
  .lang-option.active { background: var(--blue-light); color: var(--blue-dark); }

  /* ── SIDEBAR CTA ── */
  .sidebar-cta { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 150; width: 68px; transition: width 0.3s cubic-bezier(0.4,0,0.2,1); overflow: hidden; }
  .sidebar-cta:hover { width: 260px; }
  .sidebar-inner { background: linear-gradient(180deg, var(--blue-dark) 0%, var(--blue-deeper) 100%); border-radius: 0 16px 16px 0; padding: 20px 16px; box-shadow: 4px 0 24px rgba(30,64,175,0.25); min-height: 280px; display: flex; flex-direction: column; align-items: flex-start; gap: 14px; position: relative; overflow: hidden; }
  .sidebar-inner::before { content: ''; position: absolute; top: -30%; right: -40%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); border-radius: 50%; }
  .sidebar-inner * { position: relative; z-index: 1; }
  .sidebar-collapsed { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 68px; }
  .sidebar-cta:hover .sidebar-collapsed { display: none; }
  .sidebar-pulse { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; animation: sbpulse 2s infinite; }
  @keyframes sbpulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); } 50% { box-shadow: 0 0 0 10px rgba(255,255,255,0); } }
  .sidebar-pulse svg { width: 20px; height: 20px; }
  .sidebar-v-text { writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.9); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  .sidebar-expanded { display: none; width: 228px; flex-direction: column; gap: 12px; }
  .sidebar-cta:hover .sidebar-expanded { display: flex; }
  .sidebar-expanded .sb-title { font-size: 15px; font-weight: 900; color: #fff; line-height: 1.3; }
  .sidebar-expanded .sb-sub { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; }
  .sidebar-expanded .sb-divider { width: 100%; height: 1px; background: rgba(255,255,255,0.15); }
  .sidebar-expanded .sb-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .sb-stat { text-align: center; padding: 6px; background: rgba(255,255,255,0.08); border-radius: 6px; }
  .sb-stat .n { font-size: 14px; font-weight: 900; color: #fff; }
  .sb-stat .l { font-size: 9px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; }
  .demo-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 11px 16px; background: #fff; color: var(--blue-dark); border-radius: 10px; font-size: 13px; font-weight: 900; text-decoration: none; transition: all 0.2s; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  .demo-btn:hover { transform: scale(1.03); }
  .sb-phone { text-align: center; font-size: 11px; color: rgba(255,255,255,0.5); }
  .sb-phone a { color: rgba(255,255,255,0.7); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.2); }

  /* ── LAYOUT ── */
  .page-wrapper { padding-left: 68px; }
  .container { max-width: 860px; margin: 0 auto; padding: 0 24px; }

  /* ── HERO ── */
  .hero { padding: 52px 0 44px; text-align: center; }
  .hero-badge { display: inline-block; background: var(--blue-light); color: var(--blue-dark); font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 5px 14px; border-radius: 20px; margin-bottom: 18px; }
  .hero h1 { font-size: 34px; font-weight: 900; color: var(--gray-900); line-height: 1.15; letter-spacing: -0.5px; margin-bottom: 10px; }
  .hero h1 .accent { color: var(--red); }
  .hero p { font-size: 16px; color: var(--gray-500); max-width: 540px; margin: 0 auto 24px; }
  .hero-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--blue); color: #fff; padding: 13px 26px; border-radius: 10px; font-size: 15px; font-weight: 700; text-decoration: none; transition: all 0.2s; box-shadow: 0 4px 14px rgba(59,130,246,0.35); }
  .hero-cta:hover { background: var(--blue-dark); transform: translateY(-1px); }

  /* ── STATS STRIP ── */
  .stats-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 44px; }
  .stat-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 18px; text-align: center; }
  .stat-card .number { font-size: 28px; font-weight: 900; color: var(--gray-900); letter-spacing: -1px; }
  .stat-card .label { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
  .stat-card.danger { border-color: var(--red-muted); background: var(--red-light); }
  .stat-card.danger .number { color: var(--red); }

  /* ── SECTION ── */
  .section { margin-bottom: 44px; }
  .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--blue); margin-bottom: 6px; }
  .section-title { font-size: 22px; font-weight: 900; color: var(--gray-900); margin-bottom: 4px; letter-spacing: -0.3px; }
  .section-subtitle { font-size: 14px; color: var(--gray-500); margin-bottom: 20px; }

  /* ── MARKETPLACE TABLE ── */
  .marketplace-table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--gray-200); box-shadow: var(--shadow); }
  .marketplace-table th { background: var(--gray-50); padding: 10px 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--gray-500); text-align: left; border-bottom: 1px solid var(--gray-200); }
  .marketplace-table td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  .marketplace-table tr:last-child td { border-bottom: none; }
  .mp-name-cell { display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--gray-800); }
  .mp-icon-cell { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; flex-shrink: 0; background: var(--blue-light); color: var(--blue-dark); }
  .listings-num { font-weight: 700; }
  .badge-active { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; background: var(--green-light); color: var(--green); }
  .badge-inactive { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; background: var(--gray-100); color: var(--gray-400); }

  /* ── PILLS ── */
  .mp-logos-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .mp-pill { display: flex; align-items: center; gap: 5px; padding: 4px 10px; background: #fff; border: 1px solid var(--gray-200); border-radius: 6px; font-size: 11px; font-weight: 700; color: var(--gray-700); }
  .mp-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-on { background: var(--green); }
  .dot-off { background: var(--gray-300); }

  /* ── CALCULATOR ── */
  .calc-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }
  .calc-body { padding: 20px; }
  .calc-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
  .calc-row:last-child { border-bottom: none; }
  .calc-row .clabel { font-size: 13px; color: var(--gray-600); }
  .calc-row .cvalue { font-size: 15px; font-weight: 700; color: var(--gray-900); }
  .calc-input { width: 100px; text-align: right; padding: 5px 10px; border: 2px solid var(--blue); border-radius: 6px; font-family: 'Lato', sans-serif; font-size: 15px; font-weight: 700; color: var(--blue-dark); background: var(--blue-light); outline: none; }
  .calc-input:focus { border-color: var(--blue-dark); }
  .calc-hint { font-size: 10px; color: var(--blue); margin-top: 1px; }
  .calc-result { background: var(--red-light); border-top: 2px solid var(--red); padding: 18px 20px; }
  .calc-result-main { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .calc-result-label { font-size: 13px; font-weight: 700; color: var(--gray-700); }
  .calc-result-value { font-size: 26px; font-weight: 900; color: var(--red); letter-spacing: -1px; }
  .calc-result-sub { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-top: 12px; border-top: 1px solid var(--red-muted); }
  .calc-result-sub .item { text-align: center; }
  .calc-result-sub .num { font-size: 18px; font-weight: 900; color: var(--red); }
  .calc-result-sub .lbl { font-size: 10px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }
  .lost-callout { display: flex; align-items: center; gap: 14px; padding: 16px 20px; margin-top: 14px; background: var(--amber-light); border: 1px solid #FDE68A; border-radius: var(--radius); }
  .lost-callout .icon { font-size: 28px; flex-shrink: 0; }
  .lost-callout .num { font-size: 20px; font-weight: 900; color: var(--gray-900); }
  .lost-callout .desc { font-size: 12px; color: var(--gray-600); }
  .emotional-ctx { text-align: center; padding: 16px; margin-top: 12px; background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; color: var(--gray-700); }

  /* ── SPEED ── */
  .speed-grid { display: grid; grid-template-columns: 1fr 36px 1fr; align-items: center; }
  .speed-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 24px 20px; text-align: center; }
  .speed-card.danger { border-color: var(--red-muted); }
  .speed-card.success { border-color: #A7F3D0; background: var(--green-light); }
  .speed-card .time { font-size: 36px; font-weight: 900; letter-spacing: -2px; margin-bottom: 2px; }
  .speed-card.danger .time { color: var(--red); }
  .speed-card.success .time { color: var(--green); }
  .speed-card .desc { font-size: 12px; color: var(--gray-500); }
  .speed-arrow { text-align: center; font-size: 22px; color: var(--blue); }
  .speed-stat { margin-top: 14px; padding: 14px 18px; background: var(--blue-light); border-radius: var(--radius-sm); text-align: center; font-size: 13px; color: var(--gray-700); }
  .competitor-hint { margin-top: 14px; padding: 12px 18px; background: #fff; border-left: 3px solid var(--amber); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 13px; color: var(--gray-700); box-shadow: var(--shadow); }
  .social-proof { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 20px; }
  .proof-card { padding: 18px; background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); text-align: center; }
  .proof-card .num { font-size: 26px; font-weight: 900; color: var(--blue); letter-spacing: -1px; }
  .proof-card .desc { font-size: 12px; color: var(--gray-500); margin-top: 3px; }

  /* ── VIDEO ── */
  .video-section { margin-bottom: 44px; }
  .video-wrap { position: relative; border-radius: var(--radius); overflow: hidden; background: var(--gray-900); box-shadow: var(--shadow-lg); aspect-ratio: 16/9; }
  .video-wrap video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .video-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 40%, #60A5FA 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
  .play-btn { width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,0.95); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 30px rgba(0,0,0,0.3); transition: transform 0.2s; }
  .video-placeholder:hover .play-btn { transform: scale(1.1); }
  .play-btn svg { width: 28px; height: 28px; margin-left: 3px; }
  .video-caption-text { color: #fff; font-size: 15px; font-weight: 700; margin-top: 12px; text-shadow: 0 1px 8px rgba(0,0,0,0.5); }
  .video-person { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .video-person .av { width: 40px; height: 40px; border-radius: 50%; background: var(--blue); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }
  .video-person .info .n { font-size: 13px; font-weight: 700; color: var(--gray-900); }
  .video-person .info .r { font-size: 11px; color: var(--gray-500); }

  /* ── PERSONAL MESSAGE ── */
  .personal-msg { padding: 20px; background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); box-shadow: var(--shadow); }
  .personal-msg .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--blue); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; margin-bottom: 10px; }
  .personal-msg .name { font-weight: 700; font-size: 14px; color: var(--gray-900); }
  .personal-msg .role { font-size: 12px; color: var(--gray-500); margin-bottom: 10px; }
  .personal-msg .text { font-size: 13px; color: var(--gray-600); line-height: 1.7; }

  /* ── BOTTOM CTA ── */
  .bottom-cta { margin: 44px 0; padding: 44px 36px; background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-deeper) 100%); border-radius: 20px; text-align: center; position: relative; overflow: hidden; }
  .bottom-cta::before { content: ''; position: absolute; top: -50%; right: -20%; width: 360px; height: 360px; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); border-radius: 50%; }
  .bottom-cta * { position: relative; z-index: 1; }
  .bottom-cta h2 { font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 8px; letter-spacing: -0.5px; }
  .bottom-cta p { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 24px; max-width: 460px; margin-left: auto; margin-right: auto; }
  .bottom-cta .cta-btn { display: inline-flex; align-items: center; gap: 8px; background: #fff; color: var(--blue-dark); padding: 14px 30px; border-radius: 12px; font-size: 15px; font-weight: 900; text-decoration: none; transition: all 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .bottom-cta .cta-btn:hover { transform: translateY(-2px); }
  .bottom-cta .cta-secondary { display: block; margin-top: 14px; font-size: 12px; color: rgba(255,255,255,0.5); }
  .bottom-cta .cta-secondary a { color: rgba(255,255,255,0.7); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.25); }
  .bottom-cta .cta-details { display: flex; justify-content: center; gap: 20px; margin-top: 16px; font-size: 11px; color: rgba(255,255,255,0.45); }

  /* ── FOOTER ── */
  .report-footer { padding: 28px 0; text-align: center; border-top: 1px solid var(--gray-200); margin-top: 12px; }
  .footer-disclaimer { font-size: 11px; color: var(--gray-400); max-width: 560px; margin: 0 auto 12px; line-height: 1.6; }
  .footer-validity { display: inline-block; margin-top: 6px; padding: 3px 10px; background: var(--amber-light); border-radius: 4px; font-size: 10px; font-weight: 700; color: var(--amber); }
  .footer-brand { font-size: 12px; color: var(--gray-500); font-weight: 700; margin-top: 10px; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .animate { animation: fadeUp 0.45s ease-out both; }
  .delay-1 { animation-delay: 0.08s; }
  .delay-2 { animation-delay: 0.16s; }
  .delay-3 { animation-delay: 0.24s; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .sidebar-cta { display: none; }
    .page-wrapper { padding-left: 0; }
    .hero h1 { font-size: 24px; }
    .stats-strip { grid-template-columns: 1fr; }
    .speed-grid { grid-template-columns: 1fr; gap: 10px; }
    .speed-arrow { transform: rotate(90deg); }
    .social-proof { grid-template-columns: 1fr; }
    .bottom-cta { padding: 32px 20px; }
    .calc-result-sub { grid-template-columns: 1fr; gap: 6px; }
    .header-inner { gap: 8px; }
  }
</style>
</head>
<body>

<!-- SIDEBAR CTA -->
<div class="sidebar-cta">
  <div class="sidebar-inner">
    <div class="sidebar-collapsed">
      <div class="sidebar-pulse">
        <svg fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="sidebar-v-text" id="sb-book-text">Book Demo</div>
    </div>

      <div class="sb-phone" id="sb-phone-text">Or call <a href="tel:+352691000000">+352 691 000 000</a></div>
    </div>
  </div>
</div>

<!-- HEADER -->
<header class="report-header">
  <div class="header-inner">
    <div class="header-brands">
      <div class="dealer-brand">
        <img class="dealer-logo-img" id="top-dealer-logo-img" src="" alt="Dealer logo">
        <div class="dealer-name-text" id="header-dealer-name"></div>
      </div>

function str(v){ return typeof v === 'function' ? v() : v; }

function switchLang(lang){
  curLang = lang;
  document.getElementById('langSelector').classList.remove('open');
  document.getElementById('currentFlag').textContent = FLAGS[lang];
  document.getElementById('currentLang').textContent = LANG_NAMES[lang];
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-option').forEach(el => el.classList.toggle('active', el.dataset.lang === lang));
  render();
}

function buildVideoSection(t){
  const url = str(t.vidUrl);
  const isMP4 = url && (url.endsWith('.mp4') || url.includes('.mp4?'));
  const isYT  = url && (url.includes('youtube.com') || url.includes('youtu.be'));
  let inner;
  if(isMP4){
    inner = `<video controls playsinline preload="metadata" style="position:absolute;top:0;left:0;width:100%;height:100%;"><source src="${url}" type="video/mp4"></video>`;
  } else if(isYT){
    inner = `<iframe src="${url}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"></iframe>`;
  } else {
    inner = `<div class="video-placeholder" onclick="this.parentElement.innerHTML='<iframe src=\\'https://www.youtube.com/embed/dQw4w9WgXcQ\\' allowfullscreen style=\\'position:absolute;top:0;left:0;width:100%;height:100%;border:none;\\'></iframe>'">
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;"><span style="color:#fff;font-weight:900;font-size:16px;">C</span></div>
          <span style="color:rgba(255,255,255,0.8);font-weight:700;font-size:14px;">Aello Copilot</span>
        </div>
        <div class="play-btn"><svg viewBox="0 0 24 24" fill="#1E40AF"><polygon points="8,5 19,12 8,19"/></svg></div>
        <div style="color:#fff;font-size:16px;font-weight:700;text-shadow:0 1px 8px rgba(0,0,0,0.3);">${str(t.video_caption)}</div>
        <div style="color:rgba(255,255,255,0.6);font-size:12px;">${str(t.video_click)}</div>
      </div>
    </div>`;
  }
  return `<div class="video-wrap" style="position:relative;aspect-ratio:16/9;">${inner}</div>`;
}

  const logoImg = document.getElementById('top-dealer-logo-img');
  if(DEALER.logo_url){ logoImg.src = DEALER.logo_url; logoImg.style.display=''; }
  else { logoImg.style.display='none'; }

  // Update sidebar
  document.getElementById('sb-book-text').textContent = str(t.sb_book);
  document.getElementById('sb-title-text').textContent = str(t.sb_title);
  document.getElementById('sb-sub-text').textContent = str(t.sb_sub);
  document.getElementById('sb-deals-text').textContent = str(t.sb_deals);
  document.getElementById('sb-resp-text').textContent = str(t.sb_resp);
  document.getElementById('sb-cta-btn').textContent = str(t.sb_cta);
  document.getElementById('sb-phone-text').innerHTML = str(t.sb_phone);

  // Build marketplace table rows
  const LINEMEDIA=['Autoline','Machineryline','Agroline'];
  const lmMPs=DEALER.marketplaces.filter(m=>LINEMEDIA.includes(m.name)&&m.listings>0);
  const nonLmMPs=DEALER.marketplaces.filter(m=>!LINEMEDIA.includes(m.name));
  const groupedMPs=[];
  if(lmMPs.length>0){
    const lmListings=lmMPs.reduce((s,m)=>s+m.listings,0);
    const lmYears=lmMPs.length?Math.max(...lmMPs.map(m=>m.years_active)):0;
    const lmNames=lmMPs.map(m=>m.name).join(', ');
    groupedMPs.push({name:`LineMedia (${lmNames})`,listings:lmListings,years_active:lmYears});
  }
  nonLmMPs.forEach(m=>groupedMPs.push(m));
  const allMPs=DEALER.marketplaces;
  const tableRows=groupedMPs.map(mp=>{
    const active=mp.listings>0;
    const initials=mp.name.replace('LineMedia ','LM ').substring(0,2).toUpperCase();
    return `<tr>
      <td><div class="mp-name-cell"><div class="mp-icon-cell">${initials}</div>${mp.name}</div></td>
      <td class="listings-num">${active?mp.listings:'—'}</td>
      <td>${active?`<span class="badge-active">${str(t.active)}</span>`:`<span class="badge-inactive">${str(t.not_found)}</span>`}</td>
    </tr>`;
  }).join('');

  const pillsHtml=allMPs.map(mp=>{
    const on=mp.listings>0;
    return `<div class="mp-pill"><span class="dot ${on?'dot-on':'dot-off'}"></span>${mp.name}</div>`;
  }).join('');

  // Build main content
  document.getElementById('report-body').innerHTML = `
  <div class="container">
    <section class="hero animate">
      <div class="hero-badge">${str(t.badge)}</div>
      <h1>Revenue <span class="accent">Leak</span> Report<br>${DEALER.name}</h1>
      <p>${str(t.hero_sub)}</p>
      <a href="https://meetings-eu1.hubspot.com/copilot/demo" class="hero-cta">${str(t.hero_cta)} →</a>
    </section>

    <div class="stats-strip animate delay-1">
      <div class="stat-card">
        <div class="number">${uL}</div>
        <div class="label">${str(t.stat_listings)}</div>
      </div>
      <div class="stat-card">
        <div class="number">${aMP.length}</div>
        <div class="label">${str(t.stat_mp)}</div>
      </div>
      <div class="stat-card danger">
        <div class="number">€${fmt(c.moLeak)}</div>
        <div class="label">${str(t.stat_leak)}</div>
      </div>
    </div>

    <section class="section animate delay-2">
      <div class="section-label">${str(t.s1_label)}</div>
      <div class="section-title">${str(t.s1_title)}</div>
      <div class="section-subtitle">${str(t.s1_sub)}</div>
      <table class="marketplace-table">
        <thead><tr><th>${str(t.th_mp)}</th><th>${str(t.th_listings)}</th><th>${str(t.th_status)}</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div class="mp-logos-strip">${pillsHtml}</div>
    </section>

    <section class="section animate delay-3">
      <div class="section-label">${str(t.s2_label)}</div>
      <div class="section-title">${str(t.s2_title)}</div>
      <div class="personal-msg" style="margin-top:14px;">
        <div class="avatar">JD</div>
        <div class="name">Jean-Daniel Pit</div>
        <div class="role">Co-founder, Aello Copilot</div>
        <div class="text">${str(t.personal_text)}</div>
      </div>
    </section>

    <section class="section">
      <div class="section-label">${str(t.s3_label)}</div>
      <div class="section-title">${str(t.s3_title)}</div>
      <div class="section-subtitle">${str(t.s3_sub)}</div>
      <div class="calc-card">
        <div class="calc-body">
          <div class="calc-row">
            <div class="clabel">${str(t.stat_listings)}</div>
            <div class="cvalue">${uL}</div>
          </div>
          <div class="calc-row">
            <div><div class="clabel">${str(t.calc_leads)}</div><div class="calc-hint">${str(t.calc_hint)}</div></div>
            <input type="number" class="calc-input" id="leadsInput" value="${c.eL}" oninput="recalculate()">
          </div>
          <div class="calc-row">
            <div><div class="clabel">${str(t.calc_margin)}</div><div class="calc-hint">${str(t.calc_hint)}</div></div>
            <input type="number" class="calc-input" id="marginInput" value="${Math.round(STATE.avg_listing_price*STATE.gross_margin_pct)}" oninput="recalculate()" style="width:120px">
          </div>
          <div class="calc-row">
            <div><div class="clabel">${str(t.calc_conv)}</div><div class="calc-hint">${str(t.calc_hint)}</div></div>
            <div style="display:flex;align-items:center;gap:4px;">
              <input type="number" class="calc-input" id="convInput" value="${Math.round(STATE.conversion_rate*100)}" oninput="recalculate()" style="width:70px">
              <span style="font-weight:700;color:var(--gray-500);">%</span>
            </div>
          </div>
        </div>
        <div class="calc-result">
          <div class="calc-result-main">
            <div class="calc-result-label">${str(t.calc_result)}</div>
            <div class="calc-result-value" id="monthlyLeak">€${fmt(c.moLeak)}/mo</div>
          </div>
          <div class="calc-result-sub">
            <div class="item"><div class="num" id="dailyLeak">€${fmt(c.dLeak)}</div><div class="lbl">${str(t.per_day)}</div></div>
            <div class="item"><div class="num" id="monthlyLeakSub">€${fmt(c.moLeak)}</div><div class="lbl">${str(t.per_month)}</div></div>
            <div class="item"><div class="num" id="yearlyLeak">€${fmt(c.yLeak)}</div><div class="lbl">${str(t.per_year)}</div></div>
          </div>
        </div>
      </div>
      <div class="lost-callout">
        <div class="icon">⚠️</div>
        <div>
          <div class="num">${t.lost_leads(c.missedLeads)}</div>
          <div class="desc">${t.lost_deals(c.lostDeals)}</div>
        </div>
      </div>
      <div class="emotional-ctx">${t.emotional(c.dLeak)}</div>
    </section>

    <section class="section">
      <div class="section-label">${str(t.s4_label)}</div>
      <div class="section-title">${str(t.s4_title)}</div>
      <div class="section-subtitle">${str(t.s4_sub)}</div>
      <div class="speed-grid">
        <div class="speed-card danger"><div class="time">4-6h</div><div class="desc">${str(t.speed_avg)}</div></div>
        <div class="speed-arrow">→</div>
        <div class="speed-card success"><div class="time">&lt;10m</div><div class="desc">${str(t.speed_copilot)}</div></div>
      </div>
      <div class="speed-stat"><strong>${str(t.speed_stat)}</strong><br><span style="font-size:11px;color:var(--gray-400);">— Harvard Business Review</span></div>
      <div class="competitor-hint">💡 ${str(t.competitor)}</div>
      <div class="social-proof">
        <div class="proof-card"><div class="num">+8%</div><div class="desc">${str(t.proof_deals)}</div></div>
        <div class="proof-card"><div class="num">4-7h</div><div class="desc">${str(t.proof_time)}</div></div>
      </div>
    </section>

    <section class="section video-section">
      <div class="section-label">${str(t.s5_label)}</div>
      <div class="section-title">${str(t.s5_title)}</div>
      <div class="section-subtitle">${str(t.s5_sub)}</div>
      ${buildVideoSection(t)}
      <div class="video-person">
        <div class="av">JD</div>
        <div class="info"><div class="n">Jean-Daniel Pit</div><div class="r">${str(t.video_role)}</div></div>
      </div>
    </section>

    <section class="section">
      <div class="bottom-cta">
        <h2>${str(t.cta_title)}</h2>
        <p>${str(t.cta_sub)}</p>
        <a href="https://meetings-eu1.hubspot.com/copilot/demo" class="cta-btn">${str(t.cta_btn)}</a>
        <div class="cta-secondary">${str(t.cta_phone)}</div>
        <div class="cta-details"><span>${str(t.cta_d1)}</span><span>${str(t.cta_d2)}</span><span>${str(t.cta_d3)}</span></div>
      </div>
    </section>
  </div>`;

  // Footer
  document.getElementById('footer-disc').innerHTML = str(t.footer_disc);
  document.getElementById('footer-valid').textContent = str(t.footer_valid);
  document.getElementById('footer-brand').textContent = typeof t.footer_brand === 'function' ? t.footer_brand() : t.footer_brand;
}

function recalculate(){
  const leads = parseInt(document.getElementById('leadsInput').value)||0;
  const margin = parseInt(document.getElementById('marginInput').value)||0;
  const conv = parseInt(document.getElementById('convInput').value)||0;
  const lostPct = STATE.missed_rate||0.25;
  const missedLeads = Math.round(leads*lostPct);
  const lostDeals = Math.round(missedLeads*(conv/100));
  const monthly = lostDeals*margin;
  const daily = Math.round(monthly/30);
  const yearly = monthly*12;
  const t=T[curLang];
  document.getElementById('monthlyLeak').textContent=`€${fmt(monthly)}/mo`;
  document.getElementById('dailyLeak').textContent=`€${fmt(daily)}`;
  document.getElementById('monthlyLeakSub').textContent=`€${fmt(monthly)}`;
  document.getElementById('yearlyLeak').textContent=`€${fmt(yearly)}`;
}

function playVideo(el){
  const vidUrl="https://www.youtube.com/embed/dQw4w9WgXcQ";
  el.parentElement.innerHTML=`<iframe src="${vidUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
}

document.addEventListener('click',(e)=>{
  const ls=document.getElementById('langSelector');
  if(ls&&!ls.contains(e.target))ls.classList.remove('open');
});

document.addEventListener('DOMContentLoaded',()=>{
  curLang = DEALER.domain.endsWith('.nl')?'nl':'en';
  render();
});
</script>
</body>
</html>
